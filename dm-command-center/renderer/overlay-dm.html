<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>DM Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0b08;
      color: #d0af57;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      overflow: hidden;
      height: 100vh;
    }

    .overlay-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 8px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid #8b7355;
      padding-bottom: 4px;
    }

    .tab-button {
      flex: 1;
      background: #2a2520;
      border: 1px solid #8b7355;
      color: #8b7355;
      padding: 5px 4px;
      cursor: pointer;
      border-radius: 3px 3px 0 0;
      font-family: inherit;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-button.active {
      background: #8b7355;
      color: #0d0b08;
      border-color: #d0af57;
    }

    .tab-button:hover:not(.active) {
      background: #3a3530;
      color: #d0af57;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .tab-content.active {
      display: block;
    }

    .session-info {
      background: rgba(13, 11, 8, 0.95);
      border: 1px solid #8b7355;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 11px;
    }

    .session-info-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    .session-code {
      background: #2a2520;
      padding: 4px 8px;
      border-radius: 3px;
      font-weight: bold;
      color: #ffcc00;
    }

    .roll-display {
      background: rgba(13, 11, 8, 0.95);
      border: 1px solid #8b7355;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
    }

    .roll-item {
      background: #2a2520;
      padding: 6px;
      margin: 4px 0;
      border-left: 3px solid #d0af57;
      border-radius: 2px;
      font-size: 11px;
    }

    .roll-item.crit {
      border-left-color: #ffcc00;
      background: #3a3530;
    }

    .roll-item.fail {
      border-left-color: #8b3333;
    }

    .roll-label {
      font-weight: bold;
      color: #d0af57;
    }

    .roll-value {
      color: #ffcc00;
      font-weight: bold;
    }

    .roll-meta {
      font-size: 10px;
      color: #8b7355;
      margin-top: 2px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #2a2520;
    }

    ::-webkit-scrollbar-thumb {
      background: #8b7355;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a89968;
    }

    /* ── Stats Panel ─────────────────────────────────── */
    #stats-panel {
      font-size: 11px;
    }

    .stats-section {
      background: rgba(13,11,8,0.95);
      border: 1px solid #8b7355;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
    }

    .stats-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b7355;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #3a3530;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .stat-tile {
      background: #2a2520;
      border-radius: 3px;
      padding: 6px;
      text-align: center;
    }

    .stat-tile-val {
      font-size: 18px;
      font-weight: bold;
      color: #d0af57;
      line-height: 1.2;
    }

    .stat-tile-val.crit  { color: #ffcc00; }
    .stat-tile-val.nat1  { color: #c44444; }
    .stat-tile-val.high  { color: #4aaa4a; }

    .stat-tile-key {
      font-size: 9px;
      color: #8b7355;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dist-bar-row {
      display: grid;
      grid-template-columns: 40px 1fr 30px;
      align-items: center;
      gap: 4px;
      margin: 4px 0;
      font-size: 10px;
    }

    .dist-bar-label { color: #8b7355; text-align: right; }

    .dist-bar-track {
      background: #2a2520;
      border-radius: 2px;
      height: 10px;
      overflow: hidden;
    }

    .dist-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .dist-bar-fill.low    { background: #c44444; }
    .dist-bar-fill.mid    { background: #8b7355; }
    .dist-bar-fill.good   { background: #4a8a4a; }
    .dist-bar-fill.high   { background: #ffcc00; }
    .dist-bar-fill.bonus  { background: #a78bfa; }

    .dist-bar-count { color: #d0af57; font-size: 10px; }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 30px 36px;
      gap: 4px;
      padding: 3px 0;
      border-bottom: 1px solid #2a2520;
      font-size: 10px;
    }

    .action-row:last-child { border-bottom: none; }
    .action-name { color: #d0af57; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-count { color: #8b7355; text-align: center; }
    .action-avg   { color: #ffcc00; text-align: right; }

    .player-row {
      display: grid;
      grid-template-columns: 1fr 28px 28px 28px;
      gap: 4px;
      padding: 3px 0;
      border-bottom: 1px solid #2a2520;
      font-size: 10px;
    }

    .player-row:last-child { border-bottom: none; }
    .player-name  { color: #d0af57; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-avg   { color: #ffcc00; text-align: center; }
    .player-crits { color: #ffcc00; text-align: center; }
    .player-nat1s { color: #c44444; text-align: center; }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="session-info">
      <div class="session-info-row">
        <span>Session Code:</span>
        <span class="session-code" id="session-code">—</span>
      </div>
      <div class="session-info-row">
        <span>Players Connected:</span>
        <span id="player-count">1</span>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-button active" data-tab="rolls">Rolls</button>
      <button class="tab-button" data-tab="initiative">Initiative</button>
      <button class="tab-button" data-tab="stats">Stats</button>
    </div>

    <div class="tab-content active" id="tab-rolls">
      <div class="roll-display">
        <div id="rolls-list">
          <div style="color: #8b7355; text-align: center; padding: 20px;">
            No rolls yet
          </div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-initiative">
      <!-- initiative-tracker.html injected here -->
    </div>

    <div class="tab-content" id="tab-stats">
      <div id="stats-panel">
        <div style="color: #8b7355; text-align: center; padding: 20px;">
          Roll some dice to see stats
        </div>
      </div>
    </div>
  </div>

  <script src="./overlay-dm.js"></script>
</body>
</html>
