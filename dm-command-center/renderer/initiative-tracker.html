<div id="initiative-panel" class="tracker-panel" style="display: none;">
  <div class="tracker-header">
    <h2>Combat Tracker</h2>
    <div class="round-display">Round <span id="round-number">1</span></div>
  </div>

  <div class="tracker-controls">
    <form id="add-combatant-form">
      <input type="text" id="combatant-name" placeholder="Name" required />
      <input type="number" id="combatant-ac" placeholder="AC" min="0" value="10" />
      <input type="number" id="combatant-hp-max" placeholder="Max HP" min="1" required />
      <input type="number" id="combatant-init" placeholder="Initiative" min="0" max="20" />
      <button type="submit">+ Add</button>
    </form>
    <div class="tracker-buttons">
      <button id="btn-roll-init" class="btn-secondary">Roll Initiative All</button>
      <button id="btn-start-combat" class="btn-primary">Start Combat</button>
      <button id="btn-next-turn" class="btn-primary">Next Turn</button>
      <button id="btn-clear-combat" class="btn-danger">Clear Combat</button>
    </div>
  </div>

  <table class="initiative-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Init</th>
        <th>AC</th>
        <th>HP</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="combat-roster">
      <!-- Rows populated by JS -->
    </tbody>
  </table>

  <div id="combat-status" class="combat-status" style="display: none;">
    <span id="active-combatant"></span> is up!
  </div>
</div>
