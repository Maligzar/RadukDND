<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Command Center</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --border:     #30363d;
      --text:       #c9d1d9;
      --muted:      #6e7681;
      --accent:     #a78bfa;   /* violet — D&D arcane feel */
      --crit:       #f59e0b;   /* gold   — critical hit  */
      --fumble:     #ef4444;   /* red    — fumble         */
      --success:    #34d399;   /* teal   — success        */
      --font-mono:  'Courier New', Courier, monospace;
      --toolbar-h:  40px;
    }

    html, body {
      height: var(--toolbar-h);
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      user-select: none;
      -webkit-app-region: drag;   /* Allows dragging the window by the toolbar */
    }

    button, input, select {
      -webkit-app-region: no-drag;
    }

    /* ── Toolbar Layout ─────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      height: var(--toolbar-h);
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-size: 14px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
      margin-right: 8px;
    }

    .logo span {
      font-size: 10px;
      color: var(--muted);
      font-weight: normal;
      margin-left: 4px;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Roll Flash Indicator ───────────────────────────────────────────── */
    #roll-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      min-width: 200px;
      transition: border-color 0.15s, background 0.15s;
    }

    #roll-indicator.flash-crit {
      border-color: var(--crit);
      background: rgba(245,158,11,0.1);
      animation: pulse 0.4s ease-out;
    }

    #roll-indicator.flash-fumble {
      border-color: var(--fumble);
      background: rgba(239,68,68,0.1);
      animation: pulse 0.4s ease-out;
    }

    #roll-indicator.flash-normal {
      border-color: var(--accent);
      background: rgba(167,139,250,0.08);
      animation: pulse 0.3s ease-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    #roll-label  { color: var(--muted); font-size: 10px; min-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #roll-expr   { color: var(--text);  flex: 1; }
    #roll-result { font-weight: bold; font-size: 14px; min-width: 28px; text-align: right; }
    #roll-badge  { font-size: 9px; padding: 1px 4px; border-radius: 2px; background: var(--crit); color: #000; display: none; }

    /* ── Stats Readout ─────────────────────────────────────────────────── */
    #stats {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-size: 10px;
    }

    .stat { display: flex; flex-direction: column; align-items: center; line-height: 1.3; }
    .stat-val { color: var(--text); font-size: 12px; font-weight: bold; }
    .stat-key { font-size: 9px; }

    /* ── View Controls ──────────────────────────────────────────────────── */
    .view-controls {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      transition: color 0.1s, border-color 0.1s;
      -webkit-app-region: no-drag;
    }

    .btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .btn.accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Help Panel ─────────────────────────────────────────────────────── */
    #help-overlay {
      display: none;
      position: fixed;
      top: 40px;
      right: 0;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 0 8px;
      padding: 12px;
      z-index: 999;
      -webkit-app-region: no-drag;
    }

    #help-overlay.open { display: block; }

    #help-overlay h3 {
      color: var(--accent);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hk-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .hk-row:last-child { border-bottom: none; }

    .hk-key {
      color: var(--accent);
      background: rgba(167,139,250,0.1);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 0 4px;
      font-size: 10px;
    }

    .hk-label { color: var(--muted); font-size: 10px; }

    /* ── Roll Log ────────────────────────────────────────────────────────── */
    #log-overlay {
      display: none;
      position: fixed;
      top: 40px;
      left: 0;
      width: 380px;
      max-height: 400px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 0;
      padding: 12px;
      z-index: 999;
      -webkit-app-region: no-drag;
    }

    #log-overlay.open { display: block; }
    #log-overlay h3 {
      color: var(--accent);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .log-row {
      display: grid;
      grid-template-columns: 55px 1fr 30px;
      gap: 6px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
    }
    .log-row:last-child { border-bottom: none; }
    .log-row .log-result { color: var(--text); font-weight: bold; text-align: right; }
    .log-row .log-expr   { color: var(--accent); }
    .log-row .log-time   { color: var(--muted); font-size: 9px; }
  <style>
    /* Role Picker Modal */
    #role-picker {
      display: flex;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 10000;
      font-family: var(--font-mono);
    }

    .role-picker-box {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      -webkit-app-region: no-drag;
    }

    .role-picker-box h2 {
      color: var(--accent);
      font-size: 20px;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .role-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .role-btn {
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s;
    }

    .role-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.02);
    }

    .role-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .role-form {
      display: none;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .role-form.active { display: block; }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
    }

    .form-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-submit {
      flex: 1;
      padding: 10px;
      background: var(--success);
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: var(--font-mono);
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .btn-cancel {
      padding: 10px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-mono);
    }

    .btn-cancel:hover {
      color: var(--text);
      border-color: var(--text);
    }

    .session-code-display {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 8px;
      margin: 8px 0;
      text-align: center;
    }

    .session-code-display strong {
      color: var(--crit);
      font-size: 16px;
      letter-spacing: 0.1em;
    }

    .session-code-copy {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <!-- Role Picker Modal -->
  <div id="role-picker">
    <div class="role-picker-box">
      <h2>⚔ Choose Your Role</h2>

      <div class="role-buttons">
        <button class="role-btn" data-role="dm">
          🐉 Dungeon Master
        </button>
        <button class="role-btn" data-role="player">
          🗡️ Player
        </button>
      </div>

      <!-- DM Form -->
      <div class="role-form" data-role="dm">
        <div class="form-group">
          <label>Dungeon Master Name</label>
          <input type="text" id="dm-name" placeholder="Your name" value="Dungeon Master" />
        </div>
        <div class="form-group">
          <label>Party Level</label>
          <input type="number" id="party-level" placeholder="Average party level" value="5" min="1" max="20" />
        </div>
        <div class="form-group">
          <label>Party Size</label>
          <input type="number" id="party-size" placeholder="Number of PCs" value="4" min="1" max="10" />
        </div>
        <div class="form-buttons">
          <button class="btn-submit" id="btn-create-session">Create Session</button>
        </div>
      </div>

      <!-- Player Form -->
      <div class="role-form" data-role="player">
        <div class="form-group">
          <label>Session Code (from DM)</label>
          <input type="text" id="session-code" placeholder="e.g., ABC123" maxlength="6" />
        </div>
        <div class="form-buttons">
          <button class="btn-submit" id="btn-join-session">Join Session</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toolbar">

    <div class="logo">⚔ ELMINSTER <span>DM CMD v1.0</span></div>
    <div class="divider"></div>

    <!-- Roll Flash -->
    <div id="roll-indicator" title="Last roll from D&amp;D Beyond">
      <span id="roll-label">Waiting...</span>
      <span id="roll-expr">—</span>
      <span id="roll-result">—</span>
      <span id="roll-badge">CRIT!</span>
    </div>

    <div class="divider"></div>

    <!-- Session Stats -->
    <div id="stats">
      <div class="stat">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-key">rolls</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-avg">—</span>
        <span class="stat-key">avg</span>
      </div>
      <div class="stat" title="Crits">
        <span class="stat-val" id="stat-crits" style="color:var(--crit)">0</span>
        <span class="stat-key">crits</span>
      </div>
      <div class="stat" title="Fumbles">
        <span class="stat-val" id="stat-fumbles" style="color:var(--fumble)">0</span>
        <span class="stat-key">fumbles</span>
      </div>
      <div class="stat" title="Highest roll">
        <span class="stat-val" id="stat-high">—</span>
        <span class="stat-key">high</span>
      </div>
    </div>

    <!-- View Controls (right side) -->
    <div class="view-controls">
      <button class="btn" id="btn-log" title="Roll Log">📜 Log</button>
      <button class="btn" id="btn-reload-ddb"     title="Reload D&D Beyond">↺ DDB</button>
      <button class="btn" id="btn-reload-roll20"   title="Reload Roll20">↺ R20</button>
      <button class="btn" id="btn-reload-discord"  title="Reload Discord">↺ DSC</button>
      <button class="btn accent" id="btn-help" title="Hotkeys">⌨ Keys</button>
    </div>
  </div>

  <!-- Roll Log Overlay -->
  <div id="log-overlay">
    <h3>Session Roll Log</h3>
    <div id="log-list"></div>
  </div>

  <!-- Hotkey Help Overlay -->
  <div id="help-overlay">
    <h3>Global Hotkeys</h3>
    <div id="hotkey-list"></div>
  </div>

  <script src="role-picker.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
