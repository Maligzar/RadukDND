<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>Titlebar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 34px;
    overflow: hidden;
    background: transparent;
    user-select: none;
  }

  #titlebar {
    width: 100%;
    height: 34px;
    background: linear-gradient(to bottom, #1a120a, #100d08);
    border-bottom: 1px solid #c8922a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    -webkit-app-region: drag;
  }

  .horde-crest {
    width: 18px; height: 18px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  #app-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: #e8b84a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    -webkit-app-region: no-drag;
  }

  /* View tabs */
  .view-tabs {
    display: flex;
    align-items: stretch;
    gap: 2px;
    height: 100%;
    margin-left: 12px;
    -webkit-app-region: no-drag;
  }
  .view-tab {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 12px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #4a3c28;
    cursor: pointer;
    transition: color 0.12s, border-color 0.12s;
    display: flex;
    align-items: center;
  }
  .view-tab:hover { color: #a08060; }
  .view-tab.active {
    color: #e8b84a;
    border-bottom-color: #c8922a;
  }

  /* Session code badge */
  #session-badge {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: #4a3c28;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    flex: 1;
    text-align: right;
    padding-right: 8px;
    -webkit-app-region: no-drag;
  }
  #session-badge span {
    color: #c8922a;
    letter-spacing: 0.14em;
  }

  /* Window controls */
  .win-controls {
    display: flex;
    align-items: center;
    gap: 4px;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 28px; height: 22px;
    background: transparent;
    border: 1px solid #3a2e1e;
    color: #705a3a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    padding: 0;
    flex-shrink: 0;
  }
  .win-btn:hover {
    border-color: #c8922a;
    color: #c9b08a;
    background: rgba(200,146,42,0.08);
  }
  .win-btn.exit:hover {
    border-color: #8c1a1a;
    color: #cc2a2a;
    background: rgba(140,26,26,0.18);
  }
  .win-btn svg {
    width: 10px; height: 10px;
    fill: currentColor;
    overflow: visible;
  }
</style>
</head>
<body>
<div id="titlebar">
  <svg class="horde-crest" viewBox="0 0 20 20" fill="none">
    <path d="M10 2L13 7H17L14 11L15 16L10 13L5 16L6 11L3 7H7L10 2Z"
          fill="#8c1a1a" stroke="#c8922a" stroke-width="0.8"/>
  </svg>

  <span id="app-title">DND Virtual Table</span>

  <div class="view-tabs" id="view-tabs" style="display:none;">
    <button class="view-tab active" data-view="ddb"   onclick="switchView('ddb')">D&amp;D Beyond</button>
    <button class="view-tab"        data-view="roll20" onclick="switchView('roll20')">Roll20</button>
  </div>

  <div id="session-badge"></div>

  <div class="win-controls">
    <!-- Minimize -->
    <button class="win-btn" title="Minimize"
            onclick="window.electronAPI.send('window:minimize')">
      <svg viewBox="0 0 10 10">
        <rect x="1" y="4.5" width="8" height="1.2"/>
      </svg>
    </button>
    <!-- Fullscreen toggle -->
    <button class="win-btn" title="Toggle fullscreen"
            onclick="window.electronAPI.send('window:fullscreen')">
      <svg viewBox="0 0 10 10">
        <rect x="1"   y="1"   width="3.2" height="1.2"/>
        <rect x="1"   y="1"   width="1.2" height="3.2"/>
        <rect x="5.8" y="1"   width="3.2" height="1.2"/>
        <rect x="7.8" y="1"   width="1.2" height="3.2"/>
        <rect x="1"   y="7.8" width="3.2" height="1.2"/>
        <rect x="1"   y="5.8" width="1.2" height="3.2"/>
        <rect x="5.8" y="7.8" width="3.2" height="1.2"/>
        <rect x="7.8" y="5.8" width="1.2" height="3.2"/>
      </svg>
    </button>
    <!-- Exit -->
    <button class="win-btn exit" title="Exit"
            onclick="confirmExit()">
      <svg viewBox="0 0 10 10">
        <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  function switchView(view) {
    window.electronAPI.send('view:switch', { view });
    document.querySelectorAll('.view-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.view === view)
    );
  }

  window.electronAPI.on('view:active', ({ view, sessionCode }) => {
    document.getElementById('view-tabs').style.display = 'flex';
    document.querySelectorAll('.view-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.view === view)
    );
    if (sessionCode) {
      document.getElementById('session-badge').innerHTML =
        `Code: <span>${sessionCode}</span>`;
    }
  });

  function confirmExit() {
    if (confirm('Close DND Virtual Table?')) {
      window.electronAPI.send('window:exit');
    }
  }
</script>
</body>
</html>
