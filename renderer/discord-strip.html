<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0d0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    border-bottom: 1px solid #4a3c28;
    gap: 12px;
  }
  svg { opacity: 0.4; }
  span {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #4a3820;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
  <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="8" fill="#5865F2" opacity="0.6"/>
  </svg>
  <span>DISCORD — USE SECOND MONITOR</span>
</body>
</html>
