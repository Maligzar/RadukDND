<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1814;
      color: #e0d5c7;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar (collapsible icons) */
    .sidebar {
      width: 80px;
      background: #0d0b08;
      border-right: 1px solid #3a3329;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 8px;
      transition: width 0.3s ease;
      position: relative;
      z-index: 10;
    }

    .sidebar.expanded {
      width: 280px;
    }

    .sidebar-icon {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      background: #1a1814;
      flex-shrink: 0;
    }

    .sidebar.expanded .sidebar-icon {
      width: 100%;
      height: 60px;
      font-size: 1.5rem;
      justify-content: flex-start;
      padding-left: 16px;
      text-align: left;
    }

    .sidebar-icon:hover {
      background: #2a2420;
    }

    .sidebar-icon.active {
      border-left: 4px solid #ffc107;
      background: #2a2420;
    }

    .sidebar.expanded .sidebar-icon.active {
      border-left: 4px solid #ffc107;
      background: #2a2420;
    }

    .sidebar-label {
      display: none;
      margin-left: 12px;
      font-size: 0.875rem;
      flex: 1;
    }

    .sidebar.expanded .sidebar-label {
      display: inline;
    }

    .toggle-btn {
      position: absolute;
      bottom: 8px;
      left: 8px;
      width: 64px;
      height: 40px;
      background: #2a2420;
      border: 1px solid #3a3329;
      color: #e0d5c7;
      cursor: pointer;
      font-size: 0.75rem;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .sidebar.expanded .toggle-btn {
      left: 12px;
      width: 256px;
    }

    .toggle-btn:hover {
      background: #3a3329;
    }

    /* Main content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1a1814;
      overflow: hidden;
    }

    .search-bar {
      padding: 12px 16px;
      border-bottom: 1px solid #3a3329;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 150px;
      padding: 8px 12px;
      background: #2a2420;
      border: 1px solid #3a3329;
      color: #e0d5c7;
      border-radius: 4px;
      font-size: 0.875rem;
    }

    .search-input::placeholder {
      color: #8a7a6a;
    }

    .filter-select {
      padding: 8px 12px;
      background: #2a2420;
      border: 1px solid #3a3329;
      color: #e0d5c7;
      border-radius: 4px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    /* Card list view */
    .card-list {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .list-panel {
      width: 250px;
      border-right: 1px solid #3a3329;
      overflow-y: auto;
      background: #0d0b08;
    }

    .card-item {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2420;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-item:hover {
      background: #2a2420;
    }

    .card-item.selected {
      background: #3a3329;
      border-left: 3px solid #ffc107;
    }

    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .card {
      background: #2a2420;
      border: 1px solid #3a3329;
      border-radius: 6px;
      padding: 20px;
      max-width: 600px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffc107;
      margin-bottom: 8px;
    }

    .card-meta {
      font-size: 0.875rem;
      color: #8a7a6a;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #3a3329;
    }

    .card-section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .card-section-title {
      font-weight: bold;
      color: #daa520;
      font-size: 0.875rem;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-description {
      line-height: 1.4;
      font-size: 0.875rem;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8a7a6a;
      text-align: center;
      padding: 20px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8a7a6a;
      font-size: 0.875rem;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1814;
    }

    ::-webkit-scrollbar-thumb {
      background: #3a3329;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4329;
    }
  </style>
</head>
<body>
  <!-- Sidebar with collapsible icon tabs -->
  <div class="sidebar">
    <div class="sidebar-icon active" data-category="spells">
      <span>⚡</span>
      <span class="sidebar-label">Spells</span>
    </div>
    <div class="sidebar-icon" data-category="items">
      <span>🗡️</span>
      <span class="sidebar-label">Items</span>
    </div>
    <div class="sidebar-icon" data-category="creatures">
      <span>👹</span>
      <span class="sidebar-label">Creatures</span>
    </div>
    <button class="toggle-btn" id="toggleBtn">«</button>
  </div>

  <!-- Main content area -->
  <div class="content">
    <!-- Search & filter bar -->
    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by name..."
      >
      <select id="filterSelect" class="filter-select">
        <option value="">All</option>
      </select>
    </div>

    <!-- Card list + detail view -->
    <div class="card-list">
      <div class="list-panel">
        <div id="cardListContainer"></div>
      </div>
      <div class="detail-panel">
        <div id="cardDetailContainer"></div>
      </div>
    </div>
  </div>

  <script src="card-browser.js"></script>
</body>
</html>
