<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>DM Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #161210;
    color: #c9b08a;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #4a3c28;
  }

  .panel-hdr {
    background: linear-gradient(to right, #8c1a1a, #4a0c0c);
    border-bottom: 1px solid #c8922a;
    padding: 5px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .panel-hdr.neutral { background: linear-gradient(to right, #1e1810, #161210); }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 600;
    color: #e8b84a; letter-spacing: 0.12em; text-transform: uppercase;
    flex: 1;
  }
  .gem {
    width: 7px; height: 7px; border-radius: 50%;
    background: #cc2a2a; border: 1px solid #c8922a; flex-shrink: 0;
  }
  .gem.gold { background: #c8922a; border-color: #e8b84a; }
  .pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: #2a7a2a; flex-shrink: 0;
  }
  .pip.offline { background: #555; }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, #6b5535, #4a3c28, #6b5535, transparent);
    flex-shrink: 0;
  }

  .scroll-body { flex: 1; overflow-y: auto; min-height: 0; }
  .scroll-body::-webkit-scrollbar { width: 3px; }
  .scroll-body::-webkit-scrollbar-track { background: transparent; }
  .scroll-body::-webkit-scrollbar-thumb { background: #4a3c28; border-radius: 2px; }

  /* Roll entries */
  .roll-entry {
    display: grid; grid-template-columns: 34px 1fr auto;
    align-items: start; gap: 7px;
    padding: 5px 10px;
    border-bottom: 1px solid rgba(74,60,40,0.25);
    transition: background 0.1s;
  }
  .roll-entry:hover  { background: rgba(200,146,42,0.04); }
  .roll-entry.secret { background: rgba(74,30,74,0.08); }
  .roll-entry.secret:hover { background: rgba(74,30,74,0.14); }

  .dice-face {
    width: 32px; height: 32px; background: #1e1916; border: 1px solid #4a3c28;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 10px; color: #a08060; flex-shrink: 0;
  }
  .dice-face.crit   { border-color: #ffd100; background: rgba(255,209,0,0.07);  color: #ffd100; }
  .dice-face.nat1   { border-color: #cc2a2a; background: rgba(140,26,26,0.13);  color: #cc2a2a; }
  .dice-face.secret { border-color: #7a3a9a; background: rgba(74,20,100,0.12);  color: #b06ad0; }

  .roll-info { min-width: 0; }
  .roll-action { font-size: 12px; color: #e8dcc8; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roll-action.crit   { color: #ffd100; }
  .roll-action.nat1   { color: #cc2a2a; }
  .roll-action.secret { color: #b06ad0; }
  .roll-char { font-size: 10px; color: #705a3a; margin-top: 1px; }
  .roll-time { font-size: 10px; color: #4a3820; margin-top: 1px; font-family: 'Courier New', monospace; letter-spacing: 0.02em; }
  .roll-meta { text-align: right; flex-shrink: 0; }
  .roll-num { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #c9b08a; line-height: 1; }
  .roll-num.crit   { color: #ffd100; }
  .roll-num.nat1   { color: #cc2a2a; }
  .roll-num.secret { color: #b06ad0; }
  .roll-badge {
    display: inline-block; font-family: 'Cinzel', serif; font-size: 8px;
    letter-spacing: 0.06em; padding: 1px 4px; border: 1px solid; margin-top: 2px;
  }
  .roll-badge.crit   { color: #ffd100; border-color: rgba(255,209,0,0.4);    background: rgba(255,209,0,0.06); }
  .roll-badge.nat1   { color: #cc2a2a; border-color: rgba(204,42,42,0.4);    background: rgba(140,26,26,0.10); }
  .roll-badge.secret { color: #b06ad0; border-color: rgba(176,106,208,0.35); background: rgba(74,20,100,0.10); }

  .empty-state {
    padding: 20px 12px; text-align: center;
    font-family: 'Cinzel', serif; font-size: 10px;
    color: #4a3820; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* Initiative */
  .init-row {
    display: grid; grid-template-columns: 28px 1fr 26px 62px 16px;
    align-items: center; gap: 4px; padding: 4px 6px 4px 8px;
    border-bottom: 1px solid rgba(74,60,40,0.25);
    cursor: default; transition: background 0.1s; position: relative;
  }
  .init-row:hover { background: rgba(200,146,42,0.04); }
  .init-row.active-turn { background: rgba(140,26,26,0.10); border-left: 3px solid #cc2a2a; padding-left: 5px; }
  .init-row.dead { opacity: 0.45; }
  .init-num { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: #c8922a; text-align: center; }
  .init-name { font-size: 12px; color: #e8dcc8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .init-type { font-size: 9px; color: #705a3a; margin-top: 1px; }
  .init-ac {
    font-family: 'Cinzel', serif; font-size: 10px; color: #705a3a;
    text-align: center; white-space: nowrap;
  }
  .init-ac span { display: block; font-size: 7px; color: #4a3820; letter-spacing: 0.06em; }
  .hp-wrap { min-width: 56px; }
  .hp-label {
    font-size: 9px; color: #705a3a; margin-bottom: 2px; font-family: monospace;
    cursor: pointer; transition: color 0.12s; text-align: right;
  }
  .hp-label:hover { color: #c8922a; }
  .hp-track { height: 3px; background: #1e1916; border: 1px solid #4a3c28; }
  .hp-fill  { height: 100%; transition: width 0.3s; }
  .hp-full  { background: #2a7a2a; }
  .hp-mid   { background: #b07820; }
  .hp-low   { background: #8c1a1a; }
  .rm-btn {
    background: none; border: none; color: #3a2e1e;
    cursor: pointer; font-size: 11px; padding: 0; line-height: 1;
    transition: color 0.12s; opacity: 0;
  }
  .init-row:hover .rm-btn { opacity: 1; }
  .rm-btn:hover { color: #cc2a2a; }
  .init-empty {
    padding: 12px; text-align: center; font-family: 'Cinzel', serif;
    font-size: 10px; color: #4a3820; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* Action bar */
  .init-actions {
    display: flex; gap: 3px; padding: 5px 6px;
    background: #0f0d0a; border-top: 1px solid rgba(74,60,40,0.3); flex-shrink: 0;
    flex-wrap: wrap;
  }
  .act-btn {
    flex: 1; background: #1e1916; border: 1px solid #4a3c28; color: #a08060;
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 3px;
    cursor: pointer; transition: all 0.12s; white-space: nowrap; min-width: 0;
  }
  .act-btn:hover        { border-color: #c8922a; color: #e8dcc8; background: #252019; }
  .act-btn.danger:hover { border-color: #8c1a1a; color: #cc2a2a; background: rgba(140,26,26,0.12); }
  .act-btn.primary      { background: rgba(140,26,26,0.15); border-color: #8c1a1a; color: #e8b84a; }
  .act-btn.primary:hover{ background: rgba(140,26,26,0.3); }

  /* Add form */
  #add-form {
    display: none; padding: 8px; background: #0f0d0a;
    border-top: 1px solid rgba(74,60,40,0.3);
    gap: 5px; flex-direction: column; flex-shrink: 0;
  }
  #add-form.open { display: flex; }
  .form-row { display: flex; gap: 5px; }
  .add-input {
    flex: 1; background: #1e1916; border: 1px solid #4a3c28;
    color: #e8dcc8; font-family: 'IM Fell English', serif;
    font-size: 12px; padding: 4px 7px; outline: none; min-width: 0;
  }
  .add-input:focus { border-color: #c8922a; }
  .add-input::placeholder { color: #4a3820; font-size: 11px; }
  .add-input.narrow { width: 46px; flex: none; }
  .add-submit {
    background: #8c1a1a; border: 1px solid #b02020; color: #e8b84a;
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 10px; cursor: pointer; white-space: nowrap; transition: background 0.12s;
  }
  .add-submit:hover { background: #b02020; }

  /* Stats */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: rgba(74,60,40,0.2);
    border-bottom: 1px solid rgba(74,60,40,0.25);
  }
  .stat-cell {
    background: #161210; padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center;
  }
  .stat-val {
    font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700;
    color: #c9b08a; line-height: 1.1;
  }
  .stat-val.gold  { color: #ffd100; }
  .stat-val.red   { color: #cc2a2a; }
  .stat-val.green { color: #2a9a2a; }
  .stat-key {
    font-family: 'Cinzel', serif; font-size: 8px;
    color: #705a3a; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;
  }
  .dist-row {
    display: grid; grid-template-columns: 32px 1fr 20px;
    align-items: center; gap: 5px; padding: 3px 8px;
    border-bottom: 1px solid rgba(74,60,40,0.15);
  }
  .dist-label { font-family: 'Cinzel', serif; font-size: 9px; color: #705a3a; text-align: right; }
  .dist-track { height: 6px; background: #1e1916; border: 1px solid rgba(74,60,40,0.4); border-radius: 1px; overflow: hidden; }
  .dist-fill { height: 100%; border-radius: 1px; transition: width 0.4s ease; }
  .dist-fill.low  { background: #8c1a1a; }
  .dist-fill.mid  { background: #705a3a; }
  .dist-fill.good { background: #3a7a3a; }
  .dist-fill.high { background: #c8922a; }
  .dist-fill.crit { background: #ffd100; }
  .dist-count { font-family: 'Cinzel', serif; font-size: 9px; color: #705a3a; text-align: right; }
  .stats-empty {
    padding: 10px; text-align: center; font-family: 'Cinzel', serif;
    font-size: 10px; color: #3a2e1e; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .stats-toggle {
    background: none; border: none; color: #705a3a;
    cursor: pointer; font-family: 'Cinzel', serif; font-size: 10px;
    padding: 0 2px; transition: color 0.12s; flex-shrink: 0;
  }
  .stats-toggle:hover { color: #c8922a; }

  /* Status bar */
  #status-bar {
    padding: 4px 8px; background: #0d0b08;
    border-top: 1px solid rgba(74,60,40,0.3);
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .status-text {
    font-family: 'Cinzel', serif; font-size: 9px; color: #705a3a;
    letter-spacing: 0.08em; text-transform: uppercase; flex: 1;
  }
  .session-end-btn {
    background: transparent; border: 1px solid #3a2e1e; color: #705a3a;
    font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 6px; cursor: pointer; transition: all 0.12s;
  }
  .session-end-btn:hover { border-color: #8c1a1a; color: #cc2a2a; }
</style>
</head>
<body>

<div class="panel-hdr">
  <div class="gem"></div>
  <span class="panel-title">Roll Chronicle</span>
  <div class="pip" id="ddb-pip" title="D&D Beyond connection"></div>
</div>

<div class="scroll-body" id="roll-log" style="flex:1.4;">
  <div class="empty-state" id="roll-empty">Awaiting first roll...</div>
</div>

<div class="divider"></div>

<!-- Session stats panel -->
<div class="panel-hdr neutral" id="stats-hdr" style="cursor:pointer;" title="Toggle stats">
  <div class="gem gold"></div>
  <span class="panel-title">Session Stats</span>
  <button class="stats-toggle" id="stats-chevron">▲</button>
</div>
<div id="stats-body" style="flex-shrink:0;">
  <div class="stats-empty">No rolls yet</div>
</div>

<div class="divider"></div>

<div class="panel-hdr neutral">
  <div class="gem gold"></div>
  <span class="panel-title">Initiative</span>
  <span id="round-counter" style="font-family:'Cinzel',serif;font-size:9px;color:#c8922a;letter-spacing:0.06em;margin-right:4px;"></span>
  <span id="turn-counter"  style="font-family:'Cinzel',serif;font-size:9px;color:#705a3a;letter-spacing:0.06em;"></span>
</div>

<div class="scroll-body" id="init-list" style="flex:0.9;max-height:220px;">
  <div class="init-empty" id="init-empty">No combat active</div>
</div>

<div class="init-actions">
  <button class="act-btn"         id="btn-prev-turn">&#9664; Prev</button>
  <button class="act-btn primary" id="btn-next-turn">&#9654; Next</button>
  <button class="act-btn"         id="btn-add">+ Add</button>
  <button class="act-btn"         id="btn-roll-all">⚄ Roll</button>
  <button class="act-btn"         id="btn-sort">&#8597; Sort</button>
  <button class="act-btn danger"  id="btn-clear">&#10005;</button>
</div>

<div id="add-form">
  <div class="form-row">
    <input class="add-input"        id="add-name" placeholder="Name" autocomplete="off" spellcheck="false">
    <input class="add-input narrow" id="add-init" placeholder="Init" type="number" min="-5" max="40">
    <input class="add-input narrow" id="add-hp"   placeholder="HP"   type="number" min="0"  max="999">
    <input class="add-input narrow" id="add-ac"   placeholder="AC"   type="number" min="1"  max="30">
  </div>
  <div class="form-row">
    <select class="add-input" id="add-type" style="font-size:11px;color:#a08060;">
      <option value="player">Player</option>
      <option value="enemy">Enemy</option>
      <option value="ally">Ally</option>
      <option value="neutral">Neutral</option>
    </select>
    <button class="add-submit" id="btn-add-submit">Add to Combat</button>
  </div>
</div>

<div id="status-bar">
  <div class="pip" id="relay-pip" title="Relay connection"></div>
  <span class="status-text" id="status-text">DM Session</span>
  <span id="session-code-display" style="font-family:'Cinzel',serif;font-size:9px;color:#c8922a;letter-spacing:0.06em;margin-left:auto;margin-right:8px;cursor:pointer;padding:2px 6px;border:1px solid #3a2e1e;border-radius:2px;transition:all 0.12s;" title="Click to copy">Code: <strong style="color:#e8b84a;">—</strong></span>
  <button class="session-end-btn" id="btn-recap" style="margin-right:4px;">⎙ Recap</button>
  <button class="session-end-btn" id="btn-end-session">End Session</button>
</div>

<script>
'use strict';

window.addEventListener('DOMContentLoaded', () => {

  const api = window.electronAPI;
  if (!api) {
    console.error('[overlay-dm] window.electronAPI not available — preload failed');
    return;
  }

  let initiativeList = [];
  let addFormOpen    = false;
  let roundNum       = 0; // 0 = no combat, 1+ = active round

  // ── Helpers ──────────────────────────────────────────────────
  function formatTime(ms) {
    if (!ms) return '--:--:--';
    const d = new Date(ms);
    return [d.getHours(), d.getMinutes(), d.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
  }

  function esc(s) {
    return s ? String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
  }

  // ── Roll rendering ───────────────────────────────────────────
  function renderRoll(roll) {
    const crit   = Boolean(roll.is_crit);
    const nat1   = Boolean(roll.is_nat1);
    const secret = Boolean(roll.is_secret);
    const mod    = crit ? ' crit' : nat1 ? ' nat1' : secret ? ' secret' : '';

    const badge  = crit   ? '<span class="roll-badge crit">CRIT</span>'
                 : nat1   ? '<span class="roll-badge nat1">NAT 1</span>'
                 : secret ? '<span class="roll-badge secret">SECRET</span>'
                 : '';

    const charLine = (roll.character_name || roll.player_name)
      ? `<div class="roll-char">${esc(roll.character_name || '')}${roll.character_name && roll.player_name ? ' · ' : ''}${esc(roll.player_name || '')}</div>`
      : '';

    const el = document.createElement('div');
    el.className = `roll-entry${secret ? ' secret' : ''}`;
    el.innerHTML = `
      <div class="dice-face${mod}">${esc(roll.dice_type ?? 'd20')}</div>
      <div class="roll-info">
        <div class="roll-action${mod}">${esc(roll.action_label ?? roll.roll_type ?? 'Roll')}</div>
        ${charLine}
        <div class="roll-time">${formatTime(roll.rolled_at)}</div>
      </div>
      <div class="roll-meta">
        <div class="roll-num${mod}">${roll.total ?? '?'}</div>
        ${badge}
      </div>`;
    return el;
  }

  function prependRoll(roll) {
    const log = document.getElementById('roll-log');
    const emp = document.getElementById('roll-empty');
    if (emp) emp.remove();
    log.insertBefore(renderRoll(roll), log.firstChild);
  }

  // ── Initiative rendering ─────────────────────────────────────
  function renderInitiative(list) {
    initiativeList = list || [];
    const container    = document.getElementById('init-list');
    const roundEl      = document.getElementById('round-counter');
    const turnEl       = document.getElementById('turn-counter');

    if (!initiativeList.length) {
      container.innerHTML = '<div class="init-empty">No combat active</div>';
      if (roundEl) roundEl.textContent = '';
      if (turnEl)  turnEl.textContent  = '';
      return;
    }

    const activeIdx = initiativeList.findIndex(c => c.is_active_turn);
    if (roundEl) roundEl.textContent = roundNum > 0 ? `Round ${roundNum}` : '';
    if (turnEl)  turnEl.textContent  = activeIdx >= 0
      ? `Turn ${activeIdx + 1}/${initiativeList.length}` : '';

    container.innerHTML = '';
    initiativeList.forEach(c => {
      const isDead  = c.hp_max > 0 && c.hp_current <= 0;
      const pct     = c.hp_max > 0 ? Math.max(0, Math.min(100, (c.hp_current / c.hp_max) * 100)) : 0;
      const hpCls   = pct > 50 ? 'hp-full' : pct > 25 ? 'hp-mid' : 'hp-low';
      const typeMap  = { player: 'PC', enemy: 'Enemy', ally: 'Ally', neutral: 'NPC' };
      const typeLabel = typeMap[c.combatant_type] ?? c.combatant_type ?? '';

      const row = document.createElement('div');
      row.className = `init-row${c.is_active_turn ? ' active-turn' : ''}${isDead ? ' dead' : ''}`;
      row.dataset.id = c.id;
      row.innerHTML = `
        <div class="init-num">${c.initiative_score ?? '—'}</div>
        <div>
          <div class="init-name">${esc(c.combatant_name)}${isDead ? ' ☠' : ''}</div>
          <div class="init-type">${typeLabel}</div>
        </div>
        <div class="init-ac">${c.ac ?? 10}<span>AC</span></div>
        <div class="hp-wrap">
          <div class="hp-label" data-id="${c.id}" data-hp="${c.hp_current}" data-max="${c.hp_max}" title="Click to edit HP">
            ${c.hp_max > 0 ? `${c.hp_current ?? 0}/${c.hp_max}` : '—'}
          </div>
          ${c.hp_max > 0
            ? `<div class="hp-track"><div class="hp-fill ${hpCls}" style="width:${pct}%"></div></div>`
            : ''}
        </div>
        <button class="rm-btn" data-id="${c.id}" title="Remove">✕</button>`;

      row.addEventListener('click', e => {
        if (e.target.classList.contains('rm-btn') || e.target.classList.contains('hp-label')) return;
        api.send('initiative:set-turn', { id: c.id });
      });

      row.querySelector('.hp-label').addEventListener('click', () => editHp(c));
      row.querySelector('.rm-btn').addEventListener('click', () => removeCombatant(c.id));

      container.appendChild(row);
    });
  }

  function editHp(c) {
    const val = window.prompt(`HP for ${c.combatant_name} (current: ${c.hp_current}/${c.hp_max})\nEnter new value or +/-delta (e.g. -5, +10):`, c.hp_current);
    if (val === null) return;
    let newHp;
    if (/^[+-]/.test(val.trim())) {
      newHp = (c.hp_current ?? 0) + parseInt(val, 10);
    } else {
      newHp = parseInt(val, 10);
    }
    if (isNaN(newHp)) return;
    newHp = Math.max(0, Math.min(c.hp_max || 999, newHp));
    api.invoke('initiative:update', { id: c.id, hp_current: newHp }).catch(console.error);
  }

  async function removeCombatant(id) {
    try { await api.invoke('initiative:remove', { id }); } catch (e) { console.error(e); }
  }

  // ── Stats panel ──────────────────────────────────────────────
  let statsOpen = true;

  document.getElementById('stats-hdr').addEventListener('click', () => {
    statsOpen = !statsOpen;
    document.getElementById('stats-body').style.display = statsOpen ? 'block' : 'none';
    document.getElementById('stats-chevron').textContent = statsOpen ? '▲' : '▼';
  });

  async function refreshStats() {
    const body = document.getElementById('stats-body');
    let data;
    try { data = await api.invoke('stats:get'); } catch { return; }

    if (!data?.summary?.total_rolls) {
      body.innerHTML = '<div class="stats-empty">No rolls yet</div>';
      return;
    }

    const s    = data.summary;
    const dist = data.distribution || {};
    const bands = [
      { label: '1–5',   key: 'band_1_5',    cls: 'low'  },
      { label: '6–10',  key: 'band_6_10',   cls: 'mid'  },
      { label: '11–15', key: 'band_11_15',  cls: 'good' },
      { label: '16–20', key: 'band_16_20',  cls: 'high' },
      { label: '21+',   key: 'band_20plus', cls: 'crit' },
    ];
    const distTotal = bands.reduce((sum, b) => sum + (dist[b.key] || 0), 0);
    const distRows  = distTotal ? bands.map(b => {
      const count = dist[b.key] || 0;
      const pct   = Math.round((count / distTotal) * 100);
      return `<div class="dist-row">
        <div class="dist-label">${b.label}</div>
        <div class="dist-track"><div class="dist-fill ${b.cls}" style="width:${pct}%"></div></div>
        <div class="dist-count">${count}</div>
      </div>`;
    }).join('') : '';

    body.innerHTML = `
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-val">${s.total_rolls}</div>
          <div class="stat-key">Rolls</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val">${s.avg_roll ?? '—'}</div>
          <div class="stat-key">Average</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val gold">${s.total_crits} <span style="font-size:10px;color:#705a3a">${s.crit_pct}%</span></div>
          <div class="stat-key">Crits</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val red">${s.total_nat1s} <span style="font-size:10px;color:#705a3a">${s.nat1_pct}%</span></div>
          <div class="stat-key">Nat 1s</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val green">${s.highest_roll ?? '—'}</div>
          <div class="stat-key">High</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val">${s.lowest_roll ?? '—'}</div>
          <div class="stat-key">Low</div>
        </div>
      </div>
      ${distRows}
    `;
  }

  // ── IPC listeners ────────────────────────────────────────────
  api.on('roll:display',    r    => { prependRoll(r); refreshStats(); });
  api.on('initiative:sync', list => renderInitiative(list));
  api.on('hp:update', ({ combatant_name, hp_current }) =>
    renderInitiative(initiativeList.map(c =>
      c.combatant_name === combatant_name ? { ...c, hp_current } : c
    ))
  );

  // ── Button wiring ────────────────────────────────────────────
  document.getElementById('btn-next-turn').addEventListener('click', () => {
    if (!initiativeList.length) return;
    const cur   = initiativeList.findIndex(c => c.is_active_turn);
    const nextI = (cur + 1) % initiativeList.length;
    if (nextI === 0 && initiativeList.length > 0) {
      // Wrapped — new round
      roundNum = roundNum <= 0 ? 1 : roundNum + 1;
    } else if (roundNum <= 0) {
      roundNum = 1;
    }
    api.send('initiative:set-turn', { id: initiativeList[nextI].id });
  });

  document.getElementById('btn-prev-turn').addEventListener('click', () => {
    if (!initiativeList.length) return;
    const cur   = initiativeList.findIndex(c => c.is_active_turn);
    const prevI = (cur - 1 + initiativeList.length) % initiativeList.length;
    api.send('initiative:set-turn', { id: initiativeList[prevI].id });
  });

  document.getElementById('btn-sort').addEventListener('click', () => {
    api.send('initiative:sort');
  });

  document.getElementById('btn-roll-all').addEventListener('click', async () => {
    if (!initiativeList.length) return;
    for (const c of initiativeList) {
      const roll = Math.floor(Math.random() * 20) + 1;
      await api.invoke('initiative:update', { id: c.id, initiative_score: roll }).catch(console.error);
    }
    api.send('initiative:sort');
    if (roundNum <= 0) roundNum = 1;
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    if (window.confirm('Clear all initiative — end combat?')) {
      api.send('initiative:clear');
      roundNum = 0;
    }
  });

  document.getElementById('btn-add').addEventListener('click', () => {
    addFormOpen = !addFormOpen;
    document.getElementById('add-form').classList.toggle('open', addFormOpen);
    if (addFormOpen) document.getElementById('add-name').focus();
  });

  async function addCombatant() {
    const name = document.getElementById('add-name').value.trim();
    const init = parseInt(document.getElementById('add-init').value, 10);
    const hp   = parseInt(document.getElementById('add-hp').value, 10);
    const ac   = parseInt(document.getElementById('add-ac').value, 10);
    const type = document.getElementById('add-type').value;
    if (!name) { document.getElementById('add-name').focus(); return; }
    try {
      await api.invoke('initiative:add-combatant', {
        combatant_name:   name,
        combatant_type:   type,
        initiative_score: isNaN(init) ? 0 : init,
        hp_current:       isNaN(hp) ? 0 : hp,
        hp_max:           isNaN(hp) ? 0 : hp,
        ac:               isNaN(ac) ? 10 : ac,
      });
      ['add-name','add-init','add-hp','add-ac'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('add-name').focus();
    } catch (e) { console.error('[overlay-dm] add-combatant failed:', e); }
  }

  document.getElementById('btn-add-submit').addEventListener('click', addCombatant);
  document.getElementById('add-form').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCombatant();
  });

  document.getElementById('btn-recap').addEventListener('click', () => {
    api.send('recap:open');
  });

  document.getElementById('btn-end-session').addEventListener('click', () => {
    if (!window.confirm('End this session? This cannot be undone.')) return;
    api.send('session:end');
    document.getElementById('status-text').textContent = 'Session ended';
    document.getElementById('relay-pip').classList.add('offline');
  });

  // ── Bootstrap ────────────────────────────────────────────────
  // Phase 16: Display session code for sharing with players
  async function showSessionCode() {
    try {
      const session = await api.invoke('session:get');
      if (session?.session_code) {
        const codeEl = document.getElementById('session-code-display');
        codeEl.innerHTML = `Code: <strong style="color:#e8b84a;">${session.session_code}</strong>`;
        codeEl.style.borderColor = '#c8922a';
        codeEl.addEventListener('click', () => {
          navigator.clipboard.writeText(session.session_code);
          codeEl.style.background = 'rgba(200,146,42,0.1)';
          setTimeout(() => { codeEl.style.background = ''; }, 300);
        });
      }
    } catch (e) { console.warn('[overlay-dm] session:get failed:', e); }
  }

  setTimeout(async () => {
    showSessionCode();

    try {
      const rolls = await api.invoke('rolls:get');
      if (Array.isArray(rolls)) [...rolls].reverse().forEach(prependRoll);
    } catch (e) { console.warn('[overlay-dm] rolls:get failed:', e); }

    try {
      const list = await api.invoke('initiative:get');
      renderInitiative(list || []);
    } catch (e) { console.warn('[overlay-dm] initiative:get failed:', e); }

    refreshStats();
  }, 300);

  setInterval(refreshStats, 30000);

});
</script>
</body>
</html>
