<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Recap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #c8922a;
    --red:    #8c1a1a;
    --parch:  #f5f0e8;
    --ink:    #1a1410;
    --faint:  #7a6a50;
    --border: #b8a070;
  }

  body {
    background: var(--parch);
    color: var(--ink);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 13px;
    padding: 0;
  }

  /* ── Print wrapper ── */
  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 48px 60px;
  }

  /* ── Header ── */
  .report-header {
    text-align: center;
    border-bottom: 2px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 28px;
  }
  .report-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .report-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--faint);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .report-meta {
    margin-top: 10px;
    font-size: 12px;
    color: var(--faint);
    display: flex;
    justify-content: center;
    gap: 24px;
  }

  /* ── Section ── */
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 12px;
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    border: 1px solid var(--border);
    padding: 10px 8px;
    text-align: center;
    background: rgba(200,146,42,0.05);
  }
  .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .stat-val.gold { color: #a07010; }
  .stat-val.red  { color: var(--red); }
  .stat-key {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Distribution bar ── */
  .dist-row {
    display: grid;
    grid-template-columns: 40px 1fr 30px;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .dist-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--faint);
    text-align: right;
  }
  .dist-track {
    height: 8px;
    background: rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .dist-fill {
    height: 100%;
    border-radius: 1px;
  }
  .dist-fill.low  { background: #8c1a1a; }
  .dist-fill.mid  { background: #8a6820; }
  .dist-fill.good { background: #3a7a3a; }
  .dist-fill.high { background: #c8922a; }
  .dist-fill.crit { background: #e0a000; }
  .dist-count {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--faint);
    text-align: right;
  }

  /* ── Top actions table ── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  thead tr {
    border-bottom: 1px solid var(--border);
  }
  thead th {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    padding: 4px 8px;
    text-align: left;
    font-weight: 600;
  }
  tbody tr {
    border-bottom: 1px solid rgba(184,160,112,0.25);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody td {
    padding: 5px 8px;
    vertical-align: top;
  }
  td.num {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }
  td.total-high { color: #3a7a3a; }
  td.total-low  { color: var(--red); }

  /* ── Roll log ── */
  .roll-row {
    display: grid;
    grid-template-columns: 80px 1fr 40px 60px;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(184,160,112,0.2);
    font-size: 11px;
    align-items: center;
  }
  .roll-row:last-child { border-bottom: none; }
  .roll-time { color: var(--faint); font-family: monospace; font-size: 10px; }
  .roll-action { color: var(--ink); }
  .roll-action.crit { color: #8c6a00; font-weight: bold; }
  .roll-action.nat1 { color: var(--red); }
  .roll-total {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    text-align: right;
  }
  .roll-dice  { color: var(--faint); font-size: 10px; text-align: right; }
  .badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 7px;
    letter-spacing: 0.06em;
    padding: 1px 4px;
    border: 1px solid;
    vertical-align: middle;
    margin-left: 4px;
  }
  .badge.crit { color: #8c6a00; border-color: #c8922a; }
  .badge.nat1 { color: var(--red); border-color: var(--red); }

  /* ── Combatants table ── */
  .hp-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .hp-bar { flex: 1; height: 5px; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; }
  .hp-fill { height: 100%; }
  .hp-full { background: #3a7a3a; }
  .hp-mid  { background: #c8922a; }
  .hp-low  { background: var(--red); }
  .hp-text { font-family: monospace; font-size: 10px; white-space: nowrap; }

  /* ── Footer ── */
  .report-footer {
    margin-top: 40px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Print controls (hidden when printing) ── */
  .print-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #1a1410;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }
  .print-btn {
    background: var(--red);
    border: 1px solid #b02020;
    color: #f0e8d0;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .print-btn:hover { background: #b02020; }
  .print-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #c8922a;
    letter-spacing: 0.1em;
  }
  .print-spacer { flex: 1; }

  @media print {
    .print-bar { display: none !important; }
    .page { padding: 20px 32px 40px; }
    body { background: white; }
  }

  /* push page content below fixed bar */
  body { padding-top: 44px; }
  @media print { body { padding-top: 0; } }
</style>
</head>
<body>

<div class="print-bar">
  <span class="print-label">Session Recap</span>
  <div class="print-spacer"></div>
  <button class="print-btn" onclick="window.print()">⎙ Save as PDF</button>
</div>

<div class="page" id="recap-content">
  <!-- Filled by JS below -->
</div>

<script>
'use strict';

// ── Data received from main via IPC or preload ───────────────
// window.__recapData is injected by the main process before load

const api = window.electronAPI;

async function loadData() {
  try {
    const [rolls, stats, initiative, session] = await Promise.all([
      api.invoke('recap:get-rolls'),
      api.invoke('recap:get-stats'),
      api.invoke('recap:get-initiative'),
      api.invoke('recap:get-session'),
    ]);
    return { rolls: rolls || [], stats: stats || {}, initiative: initiative || [], session: session || {} };
  } catch (e) {
    console.error('[recap] Failed to load data:', e);
    return { rolls: [], stats: {}, initiative: [], session: {} };
  }
}

function formatTime(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleDateString([], { year: 'numeric', month: 'long', day: 'numeric' });
}

function formatDuration(startMs, endMs) {
  if (!startMs) return '—';
  const ms = (endMs || Date.now()) - startMs;
  const h  = Math.floor(ms / 3600000);
  const m  = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function esc(s) {
  return s ? String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '—';
}

function renderRecap({ rolls, stats, initiative, session }) {
  const s   = stats.summary    || {};
  const dist = stats.distribution || {};
  const topActions = stats.topActions || [];

  const bands = [
    { label: '1–5',   key: 'band_1_5',    cls: 'low'  },
    { label: '6–10',  key: 'band_6_10',   cls: 'mid'  },
    { label: '11–15', key: 'band_11_15',  cls: 'good' },
    { label: '16–20', key: 'band_16_20',  cls: 'high' },
    { label: '21+',   key: 'band_20plus', cls: 'crit' },
  ];
  const distTotal = bands.reduce((sum, b) => sum + (dist[b.key] || 0), 0);

  // ── Header ────────────────────────────────────────────────
  let html = `
    <div class="report-header">
      <div class="report-title">Session Recap</div>
      <div class="report-subtitle">DM Command Center &mdash; Elminster Edition</div>
      <div class="report-meta">
        <span>${formatDate(session.started_at)}</span>
        <span>DM: ${esc(session.dm_name)}</span>
        <span>Code: ${esc(session.session_code)}</span>
        <span>Duration: ${formatDuration(session.started_at, session.ended_at)}</span>
      </div>
    </div>`;

  // ── Session Stats ────────────────────────────────────────
  if (s.total_rolls) {
    html += `
      <div class="section">
        <div class="section-title">Session Statistics</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val">${s.total_rolls ?? 0}</div>
            <div class="stat-key">Total Rolls</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${s.avg_roll ?? '—'}</div>
            <div class="stat-key">Average Roll</div>
          </div>
          <div class="stat-box">
            <div class="stat-val gold">${s.total_crits ?? 0}</div>
            <div class="stat-key">Critical Hits</div>
          </div>
          <div class="stat-box">
            <div class="stat-val red">${s.total_nat1s ?? 0}</div>
            <div class="stat-key">Nat 1s</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${s.highest_roll ?? '—'}</div>
            <div class="stat-key">Highest Roll</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${s.lowest_roll ?? '—'}</div>
            <div class="stat-key">Lowest Roll</div>
          </div>
          <div class="stat-box">
            <div class="stat-val gold">${s.crit_pct ?? 0}%</div>
            <div class="stat-key">Crit Rate</div>
          </div>
          <div class="stat-box">
            <div class="stat-val red">${s.nat1_pct ?? 0}%</div>
            <div class="stat-key">Fail Rate</div>
          </div>
        </div>`;

    if (distTotal > 0) {
      html += bands.map(b => {
        const count = dist[b.key] || 0;
        const pct   = Math.round((count / distTotal) * 100);
        return `
          <div class="dist-row">
            <div class="dist-label">${b.label}</div>
            <div class="dist-track"><div class="dist-fill ${b.cls}" style="width:${pct}%"></div></div>
            <div class="dist-count">${count}</div>
          </div>`;
      }).join('');
    }
    html += `</div>`;
  }

  // ── Top Actions ──────────────────────────────────────────
  if (topActions.length) {
    html += `
      <div class="section">
        <div class="section-title">Top Actions</div>
        <table>
          <thead>
            <tr>
              <th>Action</th>
              <th style="text-align:right">Uses</th>
              <th style="text-align:right">Avg Roll</th>
            </tr>
          </thead>
          <tbody>
            ${topActions.map(a => `
              <tr>
                <td>${esc(a.action_label)}</td>
                <td class="num">${a.count}</td>
                <td class="num ${a.avg_total >= 15 ? 'total-high' : a.avg_total <= 5 ? 'total-low' : ''}">${a.avg_total}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── Combatants / Initiative ──────────────────────────────
  if (initiative.length) {
    html += `
      <div class="section">
        <div class="section-title">Combatants</div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Initiative</th>
              <th>AC</th>
              <th style="min-width:120px">HP</th>
            </tr>
          </thead>
          <tbody>
            ${initiative.map(c => {
              const pct  = c.hp_max > 0 ? Math.max(0, Math.min(100, (c.hp_current / c.hp_max) * 100)) : 0;
              const hcls = pct > 50 ? 'hp-full' : pct > 25 ? 'hp-mid' : 'hp-low';
              const typeMap = { player: 'PC', enemy: 'Enemy', ally: 'Ally', neutral: 'NPC' };
              return `
                <tr>
                  <td>${esc(c.combatant_name)}${c.hp_current === 0 && c.hp_max > 0 ? ' ☠' : ''}</td>
                  <td>${typeMap[c.combatant_type] ?? esc(c.combatant_type)}</td>
                  <td class="num">${c.initiative_score ?? '—'}</td>
                  <td class="num">${c.ac ?? '—'}</td>
                  <td>
                    ${c.hp_max > 0 ? `
                      <div class="hp-bar-wrap">
                        <div class="hp-bar"><div class="hp-fill ${hcls}" style="width:${pct}%"></div></div>
                        <span class="hp-text">${c.hp_current}/${c.hp_max}</span>
                      </div>` : '—'}
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── Roll Log ─────────────────────────────────────────────
  if (rolls.length) {
    html += `
      <div class="section">
        <div class="section-title">Roll Chronicle (${rolls.length} rolls)</div>
        ${rolls.map(r => {
          const isCrit = Boolean(r.is_crit);
          const isNat1 = Boolean(r.is_nat1);
          const mod = r.modifier ? (r.modifier > 0 ? ` +${r.modifier}` : ` ${r.modifier}`) : '';
          const badge = isCrit ? '<span class="badge crit">CRIT</span>'
                      : isNat1 ? '<span class="badge nat1">NAT 1</span>' : '';
          return `
            <div class="roll-row">
              <span class="roll-time">${formatTime(r.rolled_at)}</span>
              <span class="roll-action${isCrit ? ' crit' : isNat1 ? ' nat1' : ''}">
                ${esc(r.action_label || r.roll_type || 'Roll')}
                ${r.character_name ? ` <span style="color:#7a6a50;font-size:10px;">(${esc(r.character_name)})</span>` : ''}
                ${badge}
              </span>
              <span class="roll-dice">${esc(r.dice_type)}${mod}</span>
              <span class="roll-total${isCrit ? ' crit' : isNat1 ? ' nat1' : ''}" style="${isCrit ? 'color:#8c6a00' : isNat1 ? 'color:#8c1a1a' : ''}">${r.total}</span>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ── Footer ───────────────────────────────────────────────
  html += `
    <div class="report-footer">
      DM Command Center &mdash; Elminster Edition &mdash; ${formatDate(Date.now())}
    </div>`;

  document.getElementById('recap-content').innerHTML = html;

  // Auto-set page title for PDF filename
  document.title = `Session Recap ${formatDate(session.started_at)}`;
}

// ── Bootstrap ─────────────────────────────────────────────
if (!window.electronAPI) {
  document.getElementById('recap-content').innerHTML =
    '<p style="padding:20px;color:#8c1a1a;">Error: electronAPI not available. Must be loaded from within the app.</p>';
} else {
  loadData().then(renderRecap);
}
</script>
</body>
</html>
